spring.application.name=gestion-clients

server.port=8080

spring.datasource.url=jdbc:mysql://mysql-db:3306/gestion_clients?createDatabaseIfNotExist=true
#spring.datasource.url=jdbc:mysql://localhost:3306/gestion_clients?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Configuration JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.error.include-binding-errors=always
spring.main.allow-bean-definition-overriding=true

# Securite
app.jwt.secret=CetteCleEstTresLongueEtSecuriseePourMonProjet2026PlusDe32Caracteres
app.jwt.expiration=36000000


##cles secrete de stripe a metre ici #stripe.secret.key=${STRIPE_SECRET_KEY}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
